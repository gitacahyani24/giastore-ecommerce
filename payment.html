<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pembayaran | GIA STORE</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f2ff;
}

/* Header */
header{
    background:#D8ECFF;
    color:white;
    padding:18px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo img{
height:50px;
}

header a{
    color:blue;
    text-decoration:none;
    font-size:18px;
}

/* Container */
.container{
    max-width:1000px;
    margin:40px auto;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:30px;
}

/* Card */
.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.card h2{
    color:#4EA4FF ;
    margin-bottom:20px;
}

/* Form */

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input, textarea, select{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

textarea{
    resize:none;
}

/* Produk */

.product{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

/* Total */

.total{
    display:flex;
    justify-content:space-between;
    font-size:20px;
    font-weight:bold;
    margin-top:20px;
    color:black;
}

button{
    width:100%;
    margin-top:25px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4EA4FF;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
background:#D8ECFF;
}

footer{
    text-align:center;
    padding:20px;
    margin-top:40px;
    background:#6EB5FF;
    color:white;
}

@media(max-width:768px){

.container{
grid-template-columns:1fr;
margin:20px;
}

}
</style>
</head>

<body>

<header>

<div class="logo">
<img src="logo.png" alt="GIA STORE">
</div>
<a href="index.html">← Kembali</a>

</header>

<div class="container">

<!-- FORM -->

<div class="card">

<h2>Data Pembeli</h2>

<form id="paymentForm">

<div class="input-group">
<label>Nama Lengkap</label>
<input type="text" required>
</div>

<div class="input-group">
<label>Nomor HP</label>
<input type="tel" required>
</div>

<div class="input-group">
<label>Alamat Lengkap</label>
<textarea rows="4" required></textarea>
</div>

<div class="input-group">
<label>Metode Pembayaran</label>

<select required>

<option value="">-- Pilih --</option>

<option>Transfer Bank</option>

<option>DANA</option>

<option>OVO</option>

<option>GoPay</option>

<option>COD (Bayar di Tempat)</option>

</select>

</div>

<button type="submit">
Bayar Sekarang
</button>

</form>

</div>

<!-- RINGKASAN -->

<div class="card">

<h2>Ringkasan Pesanan</h2>

<div class="product">
<span>Oversize T-Shirt</span>
<span>Rp120.000</span>
</div>

<div class="product">
<span>Jumlah</span>
<span>1</span>
</div>

<div class="product">
<span>Ongkir</span>
<span>Rp15.000</span>
</div>

<div class="total">
<span>Total</span>
<span>Rp135.000</span>
</div>

</div>

</div>

<footer>

© 2026 GIA STORE. All Rights Reserved.

</footer>

<script>

// Menampilkan produk dari keranjang
const data = JSON.parse(localStorage.getItem("keranjang")) || [];

let isi = "";
let total = 0;

data.forEach(item => {

    total += item.harga;

    isi += `
    <div class="product">
        <span>${item.nama}</span>
        <span>Rp ${item.harga.toLocaleString()}</span>
    </div>
    `;

});

document.querySelector(".card:last-child").innerHTML = `
<h2>Ringkasan Pesanan</h2>

${isi}

<div class="product">
    <span>Ongkir</span>
    <span>Rp15.000</span>
</div>

<div class="total">
    <span>Total</span>
    <span>Rp ${(total+15000).toLocaleString()}</span>
</div>
`;

// Tombol Bayar
document.getElementById("paymentForm").addEventListener("submit", function(e){

    e.preventDefault();

    alert("Pembayaran berhasil!\n\nTerima kasih telah berbelanja di GIA STORE.");

    localStorage.removeItem("keranjang");

    window.location.href="success.html";

});
</script>

</body>
</html>
